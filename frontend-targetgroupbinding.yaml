apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: Frontend-App-Tgb
  namespace: default
  labels:
    app: FRONTEND_APP
    environment: production
spec:
  targetGroupARN: FRONTEND_TG_ARN
  targetType: ip
  serviceRef:
