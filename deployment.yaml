apiVersion: apps/v1
kind: Deployment

metadata:
  name: PROJECT_NAME
  labels:
    app: PROJECT_NAME

spec:
  replicas: 2

  selector:
    matchLabels:
      app: PROJECT_NAME

  template:
    metadata:
      labels:
        app: PROJECT_NAME

    spec:
      containers:
        - name: PROJECT_NAME
          image: IMAGE_URI

          ports:
            - containerPort: 3000

          env:
            - name: REACT_APP_BACKEND_URL
              value: "REACT_APP_BACKEND_URL"

          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 5
            periodSeconds: 20

          startupProbe:
            tcpSocket:
              port: 3000
            failureThreshold: 60
            periodSeconds: 10
